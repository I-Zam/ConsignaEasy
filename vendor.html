<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsignaEasy - Vendedor</title>
    <link rel="stylesheet" href="styles-sheets.css">
    <style>
        .vendor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .vendor-card {
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .vendor-card:hover {
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-5px);
        }

        .vendor-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .vendor-card p {
            color: #666;
            margin: 5px 0;
        }

        .movement-day {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .movement-day h4 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .vendor-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vendor-header h2 {
            margin: 0;
        }

        .btn-back {
            background: white;
            color: #667eea;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-back:hover {
            background: #f0f0f0;
        }

        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .dashboard-card {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .dashboard-card h4 {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .dashboard-card .value {
            font-size: 2em;
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .vendor-header {
                flex-direction: column;
                gap: 15px;
            }

            .vendor-grid {
                grid-template-columns: 1fr;
            }

            .table {
                font-size: 0.85em;
            }

            .table th,
            .table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>🎁 ConsignaEasy</h1>
            <p>Panel de Vendedor</p>
        </div>

        <!-- MENSAJES -->
        <div id="error-message" class="alert alert-error" style="display: none;"></div>
        <div id="success-message" class="alert alert-success" style="display: none;"></div>

        <!-- SELECCIÓN DE VENDEDOR -->
        <div id="vendor-selection">
            <h2 style="text-align: center; margin-bottom: 30px;">Selecciona tu Perfil</h2>
            <div id="vendor-selection"></div>
        </div>

        <!-- PANEL DEL VENDEDOR -->
        <div id="vendor-panel" style="display: none;">
            <div class="vendor-header">
                <h2 id="vendor-name">Vendedor</h2>
                <button class="btn-back" onclick="backToSelection()">← Cambiar Vendedor</button>
            </div>

            <!-- DASHBOARD -->
            <div class="dashboard-cards">
                <div class="dashboard-card">
                    <h4>Stock Total</h4>
                    <div class="value" id="total-items">0</div>
                </div>
                <div class="dashboard-card">
                    <h4>Ventas Totales</h4>
                    <div class="value" id="total-sales">$0</div>
                </div>
                <div class="dashboard-card">
                    <h4>Restock Total</h4>
                    <div class="value" id="total-restocks">0</div>
                </div>
            </div>

            <!-- INVENTARIO -->
            <h3 style="margin-top: 30px; margin-bottom: 15px;">📦 Mi Inventario Actual</h3>
            <div id="inventory-table"></div>

            <!-- MOVIMIENTOS -->
            <h3 style="margin-top: 30px; margin-bottom: 15px;">📊 Historial de Movimientos</h3>
            <button class="btn btn-primary" onclick="refreshData()" style="margin-bottom: 15px;">🔄 Actualizar</button>
            <div id="movements-table"></div>
        </div>
    </div>

    <script src="app-vendor.js"></script>
</body>
</html>
