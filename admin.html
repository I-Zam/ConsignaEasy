
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ConsignaEasy Pro - Admin</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h1>ConsignaEasy Pro</h1>

<div class="card">
<h2>Dashboard</h2>
<button onclick="loadDashboard()">Actualizar</button>
<div id="dashboard"></div>
</div>

<div class="card">
<h2>Crear Vendedor</h2>
<input id="vendor-id" placeholder="ID">
<input id="vendor-name" placeholder="Nombre">
<input id="vendor-commission" placeholder="Comisión %">
<button onclick="addVendor()">Guardar</button>
</div>

<div class="card">
<h2>Crear Producto</h2>
<input id="product-category" placeholder="Categoría">
<input id="product-name" placeholder="Producto">
<input id="product-price" placeholder="Precio">
<button onclick="addProduct()">Guardar</button>
</div>

<div class="card">
<h2>Inventario Global</h2>
<button onclick="loadInventory()">Actualizar Inventario</button>
<div id="inventory"></div>
</div>

<div class="card">
<h2>Registrar Visita</h2>

<select id="visit-vendor"></select>
<button onclick="startVisit()">Iniciar visita</button>

<div id="visit-area"></div>

</div>

</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="admin.js"></script>

</body>
</html>
